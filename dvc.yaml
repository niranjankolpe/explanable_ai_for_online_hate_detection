stages:

  train_baseline@${item}:
    foreach: [a, b, c]
    do:
      cmd: python src/train_baseline.py ${item}
      deps:
        - data/olid-training-v1.0.tsv
        - src/train_baseline.py
        - src/preprocess.py
      params:
        - baseline
        - subtasks
      outs:
        - models/baseline_${item}

  train_lstm@${item}:
    foreach: [a, b, c]
    do:
      cmd: python src/train_lstm.py ${item}
      deps:
        - data/olid-training-v1.0.tsv
        - src/train_lstm.py
        - src/dataset.py
        - src/model.py
        - src/preprocess.py
      params:
        - lstm
        - subtasks
      outs:
        - models/lstm_${item}

  train_bert@${item}:
    foreach: [a, b, c]
    do:
      cmd: python src/train_bert.py ${item}
      deps:
        - data/olid-training-v1.0.tsv
        - src/train_bert.py
        - src/preprocess.py
      params:
        - bert
        - subtasks
      outs:
        - models/bert_${item}

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - data
      - src/evaluate.py
      - src/predict.py
      - src/preprocess.py
      - models/baseline_a
      - models/baseline_b
      - models/baseline_c
      - models/lstm_a
      - models/lstm_b
      - models/lstm_c
      - models/bert_a
      - models/bert_b
      - models/bert_c
    params:
      - lstm
      - bert
      - subtasks
    metrics:
      - reports/metrics.json

  bias_analysis:
    cmd: python src/bias_analysis.py
    deps:
      - src/bias_analysis.py
      - src/predict.py
      - src/preprocess.py
      - models/baseline_a
      - models/lstm_a
      - models/bert_a
    outs:
      - reports/bias_report.json
