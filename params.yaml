baseline:
  test_size: 0.2

lstm:
  vocab_size:    20000
  embedding_dim: 128
  hidden_dim:    128
  num_layers:    2
  dropout:       0.5
  max_len:       25
  batch_size:    64
  epochs:        12
  learning_rate: 0.0005

bert:
  model_name:    "distilbert-base-uncased"
  max_len:       64        # tweets are short; 64 tokens sufficient and saves memory
  batch_size:    16        # reduced from 32 for low-config PC
  epochs:        1
  learning_rate: 0.00002

subtasks:
  a:
    column:      "subtask_a"
    labels:      ["NOT", "OFF"]
    test_file:   "data/testset-levela.tsv"
    labels_file: "data/labels-levela.csv"
  b:
    column:      "subtask_b"
    labels:      ["TIN", "UNT"]
    test_file:   "data/testset-levelb.tsv"
    labels_file: "data/labels-levelb.csv"
  c:
    column:      "subtask_c"
    labels:      ["IND", "GRP", "OTH"]
    test_file:   "data/testset-levelc.tsv"
    labels_file: "data/labels-levelc.csv"
