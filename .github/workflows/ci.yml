name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run code quality check
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --ignore=E402,W503,E221,E241,E225,W292,E123,E125,F401,E741,E265,E302,E501,F541,W293

      - name: Run tests
        run: python src/test.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Pull models from S3 via DVC
        run: |
          pip install dvc[s3]
          dvc pull

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        run: |
          docker build -t hate-detection-app .
          docker tag hate-detection-app:latest ${{ secrets.ECR_URI }}:latest
          docker push ${{ secrets.ECR_URI }}:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster hate-detection-cluster \
            --service hate-detection-service \
            --force-new-deployment \
            --region ap-south-1